<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ICON. AMSTERDAM — Wardrobe Review</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');

  :root {
    --cream: #F7F4ED;
    --black: #000000;
    --white: #FFFFFF;
    --keep: #1a7a3a;
    --keep-bg: #e8f5ec;
    --unsure: #b8860b;
    --unsure-bg: #fdf6e3;
    --giveaway: #c0392b;
    --giveaway-bg: #fdecea;
    --border: rgba(0,0,0,0.12);
    --shadow: 0 2px 20px rgba(0,0,0,0.08);
    --shadow-hover: 0 8px 40px rgba(0,0,0,0.15);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
    background: var(--cream);
    color: var(--black);
    overflow-x: hidden;
  }

  /* ── LOADING SCREEN ── */
  #loader {
    position: fixed; inset: 0; z-index: 9999;
    background: var(--black);
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    transition: opacity 0.8s ease, visibility 0.8s ease;
  }
  #loader.hidden { opacity: 0; visibility: hidden; pointer-events: none; }
  #loader .logo-text {
    font-family: 'Inter', sans-serif;
    font-weight: 700; font-size: 3rem;
    letter-spacing: 0.15em; color: var(--white);
    opacity: 0; transform: translateY(30px);
    animation: fadeInUp 1s ease forwards 0.3s;
  }
  #loader .logo-text span { color: var(--cream); opacity: 0.5; }
  #loader .subtitle {
    font-weight: 300; font-size: 0.9rem;
    letter-spacing: 0.3em; text-transform: uppercase;
    color: rgba(255,255,255,0.4);
    margin-top: 12px;
    opacity: 0; transform: translateY(20px);
    animation: fadeInUp 0.8s ease forwards 0.8s;
  }
  #loader .loader-bar {
    width: 200px; height: 2px;
    background: rgba(255,255,255,0.1);
    margin-top: 40px; overflow: hidden;
    opacity: 0; animation: fadeInUp 0.6s ease forwards 1.2s;
  }
  #loader .loader-bar::after {
    content: ''; display: block;
    width: 40%; height: 100%;
    background: var(--white);
    animation: loadSlide 1.5s ease-in-out infinite;
  }

  @keyframes fadeInUp {
    to { opacity: 1; transform: translateY(0); }
  }
  @keyframes loadSlide {
    0% { transform: translateX(-100%); }
    100% { transform: translateX(350%); }
  }

  /* ── HEADER ── */
  header {
    background: var(--black); color: var(--white);
    padding: 40px 0 30px;
    text-align: center;
    position: sticky; top: 0; z-index: 100;
    border-bottom: 1px solid rgba(255,255,255,0.1);
  }
  header h1 {
    font-weight: 700; font-size: 1.8rem;
    letter-spacing: 0.12em;
  }
  header h1 span { opacity: 0.4; }
  header p {
    font-weight: 300; font-size: 0.8rem;
    letter-spacing: 0.25em; text-transform: uppercase;
    opacity: 0.5; margin-top: 6px;
  }

  /* ── PROGRESS BAR ── */
  .progress-wrap {
    background: var(--black);
    padding: 0 40px 20px;
    position: sticky; top: 88px; z-index: 99;
  }
  .progress-inner {
    max-width: 900px; margin: 0 auto;
    display: flex; align-items: center; gap: 16px;
  }
  .progress-bar {
    flex: 1; height: 3px;
    background: rgba(255,255,255,0.1);
    overflow: hidden;
  }
  .progress-fill {
    height: 100%; width: 0%;
    background: var(--white);
    transition: width 0.5s cubic-bezier(0.22, 1, 0.36, 1);
  }
  .progress-text {
    color: rgba(255,255,255,0.6);
    font-size: 0.75rem; font-weight: 500;
    letter-spacing: 0.05em;
    white-space: nowrap;
  }

  /* ── STATS BAR ── */
  .stats-bar {
    background: var(--white);
    border-bottom: 1px solid var(--border);
    padding: 16px 40px;
    position: sticky; top: 111px; z-index: 98;
  }
  .stats-inner {
    max-width: 900px; margin: 0 auto;
    display: flex; justify-content: center; gap: 40px;
  }
  .stat {
    display: flex; align-items: center; gap: 8px;
    font-size: 0.8rem; font-weight: 500;
  }
  .stat .dot {
    width: 10px; height: 10px; border-radius: 50%;
  }
  .stat.keep .dot { background: var(--keep); }
  .stat.unsure .dot { background: var(--unsure); }
  .stat.giveaway .dot { background: var(--giveaway); }
  .stat .count { font-weight: 700; }

  /* ── FILTER TABS ── */
  .filter-bar {
    max-width: 900px; margin: 30px auto 0;
    padding: 0 20px;
    display: flex; flex-wrap: wrap; gap: 8px;
    justify-content: center;
  }
  .filter-btn {
    border: 1px solid var(--border);
    background: var(--white);
    padding: 8px 18px;
    font-family: inherit; font-size: 0.75rem;
    font-weight: 500; letter-spacing: 0.05em;
    text-transform: uppercase;
    cursor: pointer;
    transition: all 0.3s ease;
  }
  .filter-btn:hover { border-color: var(--black); }
  .filter-btn.active {
    background: var(--black); color: var(--white);
    border-color: var(--black);
  }

  /* ── MAIN GRID ── */
  .container {
    max-width: 940px;
    margin: 30px auto 120px;
    padding: 0 20px;
  }

  .category-label {
    font-weight: 700; font-size: 0.7rem;
    letter-spacing: 0.2em; text-transform: uppercase;
    color: rgba(0,0,0,0.4);
    padding: 30px 0 14px;
    border-bottom: 1px solid var(--border);
    margin-bottom: 16px;
  }

  /* ── ITEM CARD ── */
  .item-card {
    background: var(--white);
    border: 1px solid var(--border);
    display: flex; align-items: stretch;
    margin-bottom: 12px;
    opacity: 0; transform: translateY(20px);
    transition: all 0.5s cubic-bezier(0.22, 1, 0.36, 1);
    overflow: hidden;
  }
  .item-card.visible {
    opacity: 1; transform: translateY(0);
  }
  .item-card.answered {
    border-left: 4px solid transparent;
  }
  .item-card.answered-keep { border-left-color: var(--keep); }
  .item-card.answered-unsure { border-left-color: var(--unsure); }
  .item-card.answered-giveaway { border-left-color: var(--giveaway); }

  .item-image {
    width: 100px; min-height: 100px;
    background: var(--cream);
    flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    overflow: hidden;
  }
  .item-image img {
    width: 100%; height: 100%;
    object-fit: cover;
    transition: transform 0.5s ease;
  }
  .item-card:hover .item-image img {
    transform: scale(1.08);
  }
  .item-image .placeholder {
    font-size: 0.6rem; color: rgba(0,0,0,0.25);
    text-transform: uppercase; letter-spacing: 0.1em;
    text-align: center; padding: 10px;
  }

  .item-body {
    flex: 1; padding: 16px 20px;
    display: flex; align-items: center;
    justify-content: space-between;
    gap: 16px;
  }

  .item-name {
    font-weight: 600; font-size: 0.9rem;
    letter-spacing: 0.02em;
    flex-shrink: 0;
    max-width: 280px;
  }
  .item-link {
    font-size: 0.65rem;
    color: rgba(0,0,0,0.35);
    text-decoration: none;
    letter-spacing: 0.05em;
    text-transform: uppercase;
    margin-top: 4px;
    display: block;
    transition: color 0.2s;
  }
  .item-link:hover { color: var(--black); }

  /* ── CHOICE BUTTONS ── */
  .choices {
    display: flex; gap: 6px;
    flex-shrink: 0;
  }
  .choice-btn {
    border: 1.5px solid var(--border);
    background: transparent;
    padding: 10px 16px;
    font-family: inherit;
    font-size: 0.7rem;
    font-weight: 600;
    letter-spacing: 0.04em;
    cursor: pointer;
    transition: all 0.25s cubic-bezier(0.22, 1, 0.36, 1);
    position: relative;
    overflow: hidden;
    white-space: nowrap;
  }
  .choice-btn::before {
    content: ''; position: absolute; inset: 0;
    transform: scaleX(0); transform-origin: left;
    transition: transform 0.3s cubic-bezier(0.22, 1, 0.36, 1);
    z-index: 0;
  }
  .choice-btn span { position: relative; z-index: 1; }

  .choice-btn.keep { border-color: rgba(26,122,58,0.3); color: var(--keep); }
  .choice-btn.keep::before { background: var(--keep-bg); }
  .choice-btn.keep:hover::before,
  .choice-btn.keep.selected::before { transform: scaleX(1); }
  .choice-btn.keep.selected {
    border-color: var(--keep);
    background: var(--keep); color: var(--white);
    box-shadow: 0 2px 12px rgba(26,122,58,0.3);
    transform: scale(1.05);
  }

  .choice-btn.unsure { border-color: rgba(184,134,11,0.3); color: var(--unsure); }
  .choice-btn.unsure::before { background: var(--unsure-bg); }
  .choice-btn.unsure:hover::before,
  .choice-btn.unsure.selected::before { transform: scaleX(1); }
  .choice-btn.unsure.selected {
    border-color: var(--unsure);
    background: var(--unsure); color: var(--white);
    box-shadow: 0 2px 12px rgba(184,134,11,0.3);
    transform: scale(1.05);
  }

  .choice-btn.giveaway { border-color: rgba(192,57,43,0.3); color: var(--giveaway); }
  .choice-btn.giveaway::before { background: var(--giveaway-bg); }
  .choice-btn.giveaway:hover::before,
  .choice-btn.giveaway.selected::before { transform: scaleX(1); }
  .choice-btn.giveaway.selected {
    border-color: var(--giveaway);
    background: var(--giveaway); color: var(--white);
    box-shadow: 0 2px 12px rgba(192,57,43,0.3);
    transform: scale(1.05);
  }

  /* ── SUBMIT SECTION ── */
  .submit-section {
    position: fixed; bottom: 0; left: 0; right: 0;
    background: var(--black);
    padding: 20px 40px;
    transform: translateY(100%);
    transition: transform 0.5s cubic-bezier(0.22, 1, 0.36, 1);
    z-index: 100;
  }
  .submit-section.visible { transform: translateY(0); }
  .submit-inner {
    max-width: 900px; margin: 0 auto;
    display: flex; align-items: center;
    justify-content: space-between;
  }
  .submit-info {
    color: rgba(255,255,255,0.6);
    font-size: 0.8rem;
  }
  .submit-btn {
    background: var(--white);
    color: var(--black);
    border: none;
    padding: 14px 40px;
    font-family: inherit;
    font-size: 0.8rem;
    font-weight: 700;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    cursor: pointer;
    transition: all 0.3s ease;
  }
  .submit-btn:hover {
    background: var(--cream);
    transform: translateY(-2px);
    box-shadow: 0 4px 20px rgba(255,255,255,0.2);
  }
  .submit-btn:disabled {
    opacity: 0.3; cursor: not-allowed;
    transform: none; box-shadow: none;
  }

  /* ── SAVED TOAST ── */
  .toast {
    position: fixed; top: 30px; right: 30px;
    background: var(--keep); color: var(--white);
    padding: 16px 28px;
    font-size: 0.85rem; font-weight: 600;
    letter-spacing: 0.03em;
    z-index: 10000;
    transform: translateX(120%);
    transition: transform 0.5s cubic-bezier(0.22, 1, 0.36, 1);
  }
  .toast.show { transform: translateX(0); }
  .toast.error { background: var(--giveaway); }

  /* ── SUMMARY OVERLAY ── */
  .overlay {
    position: fixed; inset: 0; z-index: 9998;
    background: rgba(0,0,0,0.7);
    backdrop-filter: blur(8px);
    opacity: 0; visibility: hidden;
    transition: all 0.4s ease;
  }
  .overlay.visible { opacity: 1; visibility: visible; }
  .summary-panel {
    position: fixed; top: 0; right: 0; bottom: 0;
    width: 500px; max-width: 90vw;
    background: var(--white);
    z-index: 9999;
    transform: translateX(100%);
    transition: transform 0.5s cubic-bezier(0.22, 1, 0.36, 1);
    overflow-y: auto;
    padding: 40px;
  }
  .summary-panel.visible { transform: translateX(0); }
  .summary-panel h2 {
    font-size: 1.3rem; font-weight: 700;
    letter-spacing: 0.08em;
    margin-bottom: 8px;
  }
  .summary-panel .summary-subtitle {
    font-size: 0.8rem; color: rgba(0,0,0,0.4);
    letter-spacing: 0.05em; margin-bottom: 30px;
  }
  .summary-group { margin-bottom: 28px; }
  .summary-group h3 {
    font-size: 0.7rem; font-weight: 700;
    letter-spacing: 0.15em; text-transform: uppercase;
    padding-bottom: 8px;
    border-bottom: 1px solid var(--border);
    margin-bottom: 10px;
    display: flex; align-items: center; gap: 8px;
  }
  .summary-group h3 .sdot {
    width: 8px; height: 8px; border-radius: 50; display: inline-block;
  }
  .summary-group.keep h3 { color: var(--keep); }
  .summary-group.keep h3 .sdot { background: var(--keep); border-radius: 50%; }
  .summary-group.unsure h3 { color: var(--unsure); }
  .summary-group.unsure h3 .sdot { background: var(--unsure); border-radius: 50%; }
  .summary-group.giveaway h3 { color: var(--giveaway); }
  .summary-group.giveaway h3 .sdot { background: var(--giveaway); border-radius: 50%; }
  .summary-group ul {
    list-style: none; padding: 0;
  }
  .summary-group li {
    padding: 6px 0;
    font-size: 0.85rem;
    border-bottom: 1px solid rgba(0,0,0,0.04);
  }
  .summary-close {
    position: absolute; top: 20px; right: 20px;
    background: none; border: 1px solid var(--border);
    width: 36px; height: 36px;
    font-size: 1.2rem; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.2s;
  }
  .summary-close:hover {
    background: var(--black); color: var(--white);
  }
  .summary-unanswered {
    margin-top: 20px;
    padding: 16px;
    background: rgba(0,0,0,0.03);
    font-size: 0.8rem;
    color: rgba(0,0,0,0.5);
  }

  /* ── RESPONSIVE ── */
  @media (max-width: 700px) {
    .item-card { flex-direction: row; }
    .item-image { width: 75px; min-height: 75px; }
    .item-body {
      flex-direction: column; align-items: flex-start;
      gap: 8px; padding: 10px 12px;
    }
    .item-name { max-width: 100%; font-size: 0.8rem; }
    .item-link { font-size: 0.55rem; margin-top: 2px; }
    .choices { width: 100%; display: flex; gap: 4px; }
    .choice-btn {
      flex: 1; text-align: center;
      padding: 7px 4px; font-size: 0.55rem;
      letter-spacing: 0;
    }
    .choice-btn .full-label { display: none; }
    .choice-btn .short-label { display: inline; }
    .choice-btn.selected { transform: scale(1.02); }
    .stats-bar { padding: 10px 16px; }
    .stats-inner { gap: 12px; flex-wrap: wrap; justify-content: center; }
    .stat { font-size: 0.65rem; }
    .submit-inner { flex-direction: column; gap: 10px; text-align: center; }
    .submit-section { padding: 14px 16px; }
    .filter-bar { padding: 0 10px; gap: 4px; }
    .filter-btn { padding: 5px 9px; font-size: 0.55rem; }
    header { padding: 22px 16px 16px; }
    header h1 { font-size: 1.2rem; }
    header p { font-size: 0.65rem; }
    .progress-wrap { padding: 0 16px 12px; }
    .container { padding: 0 10px; margin-bottom: 120px; }
    .category-label { padding: 18px 0 8px; font-size: 0.6rem; }
    .item-card { margin-bottom: 8px; }
  }
  @media (min-width: 701px) {
    .choice-btn .short-label { display: none; }
  }

  /* ── CARD HIDDEN BY FILTER ── */
  .item-card.filter-hidden {
    display: none;
  }
</style>
</head>

// ── STATE ──
let selections = {};
let imageCache = {};
const BLOB_ID = '019f5fbf-de34-7ae4-8879-8f6810ec0394';
let saveTimeout = null;

// ── JSONBLOB PERSISTENCE ──
async function initStorage() {
  try {
    const res = await fetch(`https://jsonblob.com/api/jsonBlob/${BLOB_ID}`, {
      headers: { 'Content-Type': 'application/json', 'Accept': 'application/json' }
    });
    if (res.ok) {
      const data = await res.json();
      if (data.selections) {
        selections = data.selections;
      }
    }
  } catch (e) {
    console.log('Could not load saved data, starting fresh');
    // Fall back to localStorage
    const local = localStorage.getItem('icon-wardrobe-selections');
    if (local) {
      try { selections = JSON.parse(local); } catch (e2) {}
    }
  }
}

async function saveToCloud() {
  // Always save to localStorage as backup
  localStorage.setItem('icon-wardrobe-selections', JSON.stringify(selections));

  try {
    await fetch(`https://jsonblob.com/api/jsonBlob/${BLOB_ID}`, {
      method: 'PUT',
      headers: { 'Content-Type': 'application/json', 'Accept': 'application/json' },
      body: JSON.stringify({
        selections,
        lastUpdated: new Date().toISOString(),
        totalItems: items.length,
        answered: Object.keys(selections).length
      })
    });
  } catch (e) {
    console.log('Cloud save failed, data preserved locally');
  }
}

function debouncedSave() {
  clearTimeout(saveTimeout);
  saveTimeout = setTimeout(saveToCloud, 800);
}

function updateShareLink() {
  document.getElementById('submitInfo').innerHTML =
    'All selections auto-save to the cloud';
}

// ── IMAGE LOADING ──
async function loadProductImage(slug) {
  if (!slug) return null;
  if (imageCache[slug]) return imageCache[slug];
  try {
    const res = await fetch(`https://icon-amsterdam.com/products/${slug}.json`);
    if (res.ok) {
      const data = await res.json();
      if (data.product && data.product.images && data.product.images.length > 0) {
        const imgUrl = data.product.images[0].src;
        imageCache[slug] = imgUrl;
        return imgUrl;
      }
    }
  } catch (e) {}
  return null;
}

// ── RENDER ──
function renderItems() {
  const container = document.getElementById('itemsContainer');
  const categories = [...new Set(items.map(i => i.category))];
  let html = '';

  categories.forEach(cat => {
    html += `<div class="category-label" data-category="${cat}">${cat}</div>`;
    items.filter(i => i.category === cat).forEach((item, idx) => {
      const id = item.name.toLowerCase().replace(/[^a-z0-9]/g, '-');
      const sel = selections[id] || '';
      const answeredClass = sel ? `answered answered-${sel}` : '';
      const productUrl = item.slug ? `https://icon-amsterdam.com/products/${item.slug}` : '#';

      html += `
        <div class="item-card ${answeredClass}" data-id="${id}" data-category="${cat}" id="card-${id}">
          <div class="item-image" id="img-${id}">
            <div class="placeholder">ICON.</div>
          </div>
          <div class="item-body">
            <div>
              <div class="item-name">${item.name}</div>
              ${item.slug ? `<a href="${productUrl}" target="_blank" class="item-link">View on ICON.Amsterdam &rarr;</a>` : ''}
            </div>
            <div class="choices">
              <button class="choice-btn keep ${sel === 'keep' ? 'selected' : ''}" onclick="select('${id}','keep')">
                <span class="full-label">Definitely Keep</span><span class="short-label">Keep</span>
              </button>
              <button class="choice-btn unsure ${sel === 'unsure' ? 'selected' : ''}" onclick="select('${id}','unsure')">
                <span class="full-label">Not Sure</span><span class="short-label">Not Sure</span>
              </button>
              <button class="choice-btn giveaway ${sel === 'giveaway' ? 'selected' : ''}" onclick="select('${id}','giveaway')">
                <span class="full-label">OK to Give Away</span><span class="short-label">Give Away</span>
              </button>
            </div>
          </div>
        </div>`;
    });
  });

  container.innerHTML = html;

  // Render filter tabs
  const filterBar = document.getElementById('filterBar');
  filterBar.innerHTML = `<button class="filter-btn active" onclick="filterCategory('all', this)">All (${items.length})</button>`;
  categories.forEach(cat => {
    const count = items.filter(i => i.category === cat).length;
    filterBar.innerHTML += `<button class="filter-btn" onclick="filterCategory('${cat}', this)">${cat} (${count})</button>`;
  });

  // Staggered reveal animation
  const cards = document.querySelectorAll('.item-card');
  const observer = new IntersectionObserver((entries) => {
    entries.forEach((entry, i) => {
      if (entry.isIntersecting) {
        setTimeout(() => entry.target.classList.add('visible'), i * 40);
        observer.unobserve(entry.target);
      }
    });
  }, { threshold: 0.1 });
  cards.forEach(card => observer.observe(card));

  // Load images lazily
  loadAllImages();
  updateStats();
  updateShareLink();
}

async function loadAllImages() {
  for (const item of items) {
    if (!item.slug) continue;
    const id = item.name.toLowerCase().replace(/[^a-z0-9]/g, '-');
    const imgContainer = document.getElementById(`img-${id}`);
    if (!imgContainer) continue;

    const imgUrl = await loadProductImage(item.slug);
    if (imgUrl) {
      const img = new Image();
      img.src = imgUrl;
      img.alt = item.name;
      img.onload = () => {
        imgContainer.innerHTML = '';
        imgContainer.appendChild(img);
      };
    }
  }
}

// ── SELECTION LOGIC ──
function select(id, choice) {
  // Toggle off if same choice
  if (selections[id] === choice) {
    delete selections[id];
  } else {
    selections[id] = choice;
  }

  const card = document.getElementById(`card-${id}`);
  card.classList.remove('answered', 'answered-keep', 'answered-unsure', 'answered-giveaway');

  if (selections[id]) {
    card.classList.add('answered', `answered-${selections[id]}`);
  }

  // Update buttons
  card.querySelectorAll('.choice-btn').forEach(btn => {
    btn.classList.remove('selected');
    if (btn.classList.contains(selections[id])) {
      btn.classList.add('selected');
    }
  });

  // Quick pulse animation on the card
  card.style.transform = 'scale(0.98)';
  setTimeout(() => card.style.transform = '', 150);

  updateStats();
  debouncedSave();
}

function updateStats() {
  const vals = Object.values(selections);
  const keepCount = vals.filter(v => v === 'keep').length;
  const unsureCount = vals.filter(v => v === 'unsure').length;
  const giveawayCount = vals.filter(v => v === 'giveaway').length;
  const total = vals.length;

  document.getElementById('countKeep').textContent = keepCount;
  document.getElementById('countUnsure').textContent = unsureCount;
  document.getElementById('countGiveaway').textContent = giveawayCount;

  document.getElementById('progressFill').style.width = `${(total / items.length) * 100}%`;
  document.getElementById('progressText').textContent = `${total} / ${items.length}`;

  // Show submit bar when at least 1 selection
  document.getElementById('submitSection').classList.toggle('visible', total > 0);
}

// ── FILTER ──
function filterCategory(cat, btn) {
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');

  document.querySelectorAll('.item-card').forEach(card => {
    if (cat === 'all' || card.dataset.category === cat) {
      card.classList.remove('filter-hidden');
    } else {
      card.classList.add('filter-hidden');
    }
  });

  document.querySelectorAll('.category-label').forEach(label => {
    if (cat === 'all' || label.dataset.category === cat) {
      label.style.display = '';
    } else {
      label.style.display = 'none';
    }
  });
}

// ── SUMMARY ──
function showSummary() {
  const content = document.getElementById('summaryContent');
  const groups = { keep: [], unsure: [], giveaway: [] };
  const unanswered = [];

  items.forEach(item => {
    const id = item.name.toLowerCase().replace(/[^a-z0-9]/g, '-');
    const sel = selections[id];
    if (sel) {
      groups[sel].push(item.name);
    } else {
      unanswered.push(item.name);
    }
  });

  let html = '';

  if (groups.keep.length) {
    html += `<div class="summary-group keep">
      <h3><span class="sdot"></span> Definitely Keep (${groups.keep.length})</h3>
      <ul>${groups.keep.map(n => `<li>${n}</li>`).join('')}</ul>
    </div>`;
  }
  if (groups.unsure.length) {
    html += `<div class="summary-group unsure">
      <h3><span class="sdot"></span> Not Sure (${groups.unsure.length})</h3>
      <ul>${groups.unsure.map(n => `<li>${n}</li>`).join('')}</ul>
    </div>`;
  }
  if (groups.giveaway.length) {
    html += `<div class="summary-group giveaway">
      <h3><span class="sdot"></span> OK to Give Away (${groups.giveaway.length})</h3>
      <ul>${groups.giveaway.map(n => `<li>${n}</li>`).join('')}</ul>
    </div>`;
  }
  if (unanswered.length) {
    html += `<div class="summary-unanswered">
      <strong>${unanswered.length} items</strong> not yet reviewed: ${unanswered.join(', ')}
    </div>`;
  }

  content.innerHTML = html;
  document.getElementById('overlay').classList.add('visible');
  document.getElementById('summaryPanel').classList.add('visible');
}

function closeSummary() {
  document.getElementById('overlay').classList.remove('visible');
  document.getElementById('summaryPanel').classList.remove('visible');
}

// ── TOAST ──
function showToast(msg, isError = false) {
  const toast = document.getElementById('toast');
  toast.textContent = msg;
  toast.className = 'toast show' + (isError ? ' error' : '');
  setTimeout(() => toast.classList.remove('show'), 3000);
}

// ── INIT ──
async function init() {
  await initStorage();
  renderItems();

  // Hide loader
  setTimeout(() => {
    document.getElementById('loader').classList.add('hidden');
  }, 2200);
}

init();
</script>
